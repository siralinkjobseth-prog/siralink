<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SiraLink Mini App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-gray-50 text-gray-900 select-none antialiased">

  <main id="app-root" class="min-h-screen">
    <div class="flex items-center justify-center h-screen">
      <p class="text-sm text-gray-500 font-medium">SiraLink እየተዘጋጀ ነው...</p>
    </div>
  </main>

  <nav id="bottom-nav" class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-100 flex justify-around items-center py-2 shadow-lg z-50 hidden">
    
    <a href="#home" class="nav-item flex flex-col items-center text-gray-400 font-bold text-[11px] space-y-0.5 transition-colors duration-200" id="nav-home">
      <span class="text-xl">📊</span>
      <span>ዳሽቦርድ</span>
    </a>

    <a href="#jobs" class="nav-item flex flex-col items-center text-gray-400 font-bold text-[11px] space-y-0.5 transition-colors duration-200" id="nav-jobs">
      <span class="text-xl">💼</span>
      <span>ስራዎች</span>
    </a>

    <a href="#profile" class="nav-item flex flex-col items-center text-gray-400 font-bold text-[11px] space-y-0.5 transition-colors duration-200" id="nav-profile">
      <span class="text-xl">👤</span>
      <span>ፕሮፋይል</span>
    </a>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
